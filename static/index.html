<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olivetti Multisumma 20</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="machine-wrapper">

        <img src="olivetti-front.jpg" alt="Olivetti Multisumma 20" class="machine-photo"
             draggable="false" ondragstart="return false;">

        <!-- Digit counter marker in the display window -->
        <div class="digit-counter">
            <div class="marker" id="digit-marker"></div>
        </div>

        <!-- Receipt cover — hides text behind plastic -->
        <div class="receipt-cover" id="receipt-cover"></div>

        <!-- Paper receipt — comes out of the printer -->
        <div class="receipt-container">
            <div class="receipt" id="receipt"></div>
        </div>

        <!-- Number keys (white) -->
        <button class="btn btn-white" onclick="pressDigit('7')"
            style="left:38%; top:57%; width:6.5%; height:4%;" title="7"></button>
        <button class="btn btn-white" onclick="pressDigit('8')"
            style="left:45%; top:57%; width:6.5%; height:4%;" title="8"></button>
        <button class="btn btn-white" onclick="pressDigit('9')"
            style="left:52%; top:57%; width:6.5%; height:4%;" title="9"></button>

        <button class="btn btn-white" onclick="pressDigit('4')"
            style="left:38%; top:62.5%; width:6.5%; height:4%;" title="4"></button>
        <button class="btn btn-white" onclick="pressDigit('5')"
            style="left:45%; top:62.5%; width:6.5%; height:4%;" title="5"></button>
        <button class="btn btn-white" onclick="pressDigit('6')"
            style="left:52%; top:62.5%; width:6.5%; height:4%;" title="6"></button>

        <button class="btn btn-white" onclick="pressDigit('1')"
            style="left:38%; top:68%; width:6.5%; height:4%;" title="1"></button>
        <button class="btn btn-white" onclick="pressDigit('2')"
            style="left:45%; top:68%; width:6.5%; height:4%;" title="2"></button>
        <button class="btn btn-white" onclick="pressDigit('3')"
            style="left:52%; top:68%; width:6.5%; height:4%;" title="3"></button>

        <button class="btn btn-white" onclick="pressDigit('0')"
            style="left:38%; top:73%; width:6.5%; height:4%;" title="0"></button>
        <button class="btn" onclick="pressDigit('00')"
            style="left:45%; top:73%; width:6.5%; height:4%;" title="00"></button>
        <button class="btn" onclick="pressDigit('000')"
            style="left:52%; top:73%; width:6.5%; height:4%;" title="000"></button>

        <!-- Operation keys -->
        <button class="btn btn-red" onclick="pressOp('subtract')"
            style="left:63%; top:56.5%; width:10%; height:10%;" title="subtract"></button>
        <button class="btn" onclick="pressOp('add')"
            style="left:63%; top:67.5%; width:10%; height:10%;" title="add"></button>
        <button class="btn" onclick="pressSubtotal()"
            style="left:74%; top:62%; width:6.5%; height:4.5%;" title="subtotal"></button>
        <button class="btn" onclick="pressTotal()"
            style="left:74%; top:73%; width:6.5%; height:4.5%;" title="total"></button>
        <button class="btn btn-red" onclick="pressEquals()"
            style="left:12%; top:66%; width:10%; height:5.5%; border-radius:50%;" title="equals"></button>
        <button class="btn" onclick="pressOp('multiply')"
            style="left:10%; top:72%; width:8%; height:4.5%;" title="multiply"></button>
        <button class="btn" onclick="pressClear()"
            style="left:19%; top:72%; width:8%; height:4.5%;" title="clear"></button>
        <button class="btn" onclick="pressOp('divide')"
            style="left:16%; top:59.5%; width:7%; height:5%;" title="divide"></button>

    </div>

    <script src="sound.js"></script>
    <script src="effects.js"></script>
    <script src="api.js"></script>
    <script src="calculator.js"></script>
</body>
</html>
