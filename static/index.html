<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olivetti Multisumma 20</title>

    <style>
        /* ══════════════════════════════════════════════════════════
           PAGE
           ══════════════════════════════════════════════════════════ */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #b0a898;
            font-family: sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ══════════════════════════════════════════════════════════
           MACHINE CONTAINER
           The real photo is the background. Everything is overlaid.
           All children use absolute positioning with % values
           mapped to the actual key locations in the photo.
           ══════════════════════════════════════════════════════════ */
        .machine-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
        }

        /* The photo — sets the aspect ratio of the container */
        .machine-photo {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
            /* Slight enhancement for crispness */
            image-rendering: auto;
            filter: contrast(1.03) brightness(1.02);
        }

        /* ══════════════════════════════════════════════════════════
           PAPER RECEIPT — Curls forward out of the printer
           Like the real machine: paper exits the top slot,
           curls over the roller, and hangs down over the front.
           ══════════════════════════════════════════════════════════ */
        .receipt-container {
            position: absolute;
            /* Centered on the printer roller slot */
            top: 16%;
            left: 28%;
            width: 30%;
            z-index: 10;
            pointer-events: none;
            /* Fixed visible window — paper scrolls behind this */
            overflow: hidden;
            /* Height of the visible paper area in the photo */
            height: 12%;
        }


        @font-face {
            font-family: 'ImpactPrint';
            src: local('Courier New');
        }

        .receipt {
            background: transparent;
            padding: 0 12px;
            font-family: "Courier New", monospace;
            font-size: 0.48em;
            color: #3a3a3a;
            pointer-events: auto;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: unset;
            font-smooth: never;
        }

        /* Receipt line — impact printing look */
        .r-line {
            display: flex;
            justify-content: space-between;
            padding: 0 2px;
            white-space: nowrap;
            height: 1.1em;
            line-height: 1.1em;
            /* Impact print: ink bleed + slight blur + uneven density */
            text-shadow:
                0.4px 0 0 rgba(0,0,0,0.15),
                -0.2px 0 0 rgba(0,0,0,0.08),
                0 0.3px 0 rgba(0,0,0,0.1),
                0 0 0.8px rgba(0,0,0,0.12);
            letter-spacing: 0.5px;
            filter: blur(0.15px) contrast(0.85);
        }

        .r-line .r-val {
            text-align: right;
            flex: 1;
            color: #3a3a3a;
        }

        .r-line .r-op {
            width: 22px;
            text-align: center;
            font-weight: 700;
            color: #3a3a3a;
        }

        .r-line.r-total {
            font-weight: 700;
            color: #742121;
            filter: blur(0.2px) contrast(0.8);
        }

        .r-line.r-total .r-val,
        .r-line.r-total .r-op {
            color: #742121;
            text-shadow:
                0.4px 0 0 rgba(116,33,33,0.2),
                -0.2px 0 0 rgba(116,33,33,0.1),
                0 0.3px 0 rgba(116,33,33,0.12),
                0 0 0.8px rgba(116,33,33,0.15);
        }



        /* ══════════════════════════════════════════════════════════
           RECEIPT COVER — hides text behind plastic
           Positioned over the receipt area with photo background
           to blend seamlessly with the machine
           ══════════════════════════════════════════════════════════ */
        .receipt-cover {
            position: absolute;
            z-index: 11;
            pointer-events: none;
            background-image: url('olivetti-front.jpg');
            background-size: var(--machine-w) var(--machine-h);
            background-position: var(--cover-bg-x) var(--cover-bg-y);
        }

        /* ══════════════════════════════════════════════════════════
           DIGIT COUNTER — small line in the display window
           Slides left as digits are entered, resets on result
           ══════════════════════════════════════════════════════════ */
        .digit-counter {
            position: absolute;
            /* Over the display window in the photo */
            left: 20%;
            top: 52.5%;
            width: 25%;
            height: 2.5%;
            z-index: 5;
            pointer-events: none;
            overflow: hidden;
        }

        .digit-counter .marker {
            position: absolute;
            left: 8%;
            top: 0%;
            width: 6px;
            height: 100%;
            background-image: url('olivetti-front.jpg');
            background-size: var(--machine-w) var(--machine-h);
            background-position: var(--marker-bg-x) var(--marker-bg-y);
            border-radius: 1px;
            transition: left 0.08s ease-out;
        }

        /* ══════════════════════════════════════════════════════════
           INVISIBLE BUTTON OVERLAYS
           Transparent buttons positioned exactly over each key
           in the photo. On press, a visual feedback overlay shows.
           ══════════════════════════════════════════════════════════ */
        .btn {
            position: absolute;
            border: none;
            background: transparent;
            cursor: pointer;
            z-index: 6;
            border-radius: 3px;
            /* No visible appearance — the photo key is visible beneath */
            outline: none;
            transition: box-shadow 0.05s, background 0.05s;
        }

        /* Hover — subtle highlight to show interactivity */
        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1);
        }

        /* Active / pressed — darkening + inset shadow simulating key depression */
        .btn:active {
            background: rgba(0, 0, 0, 0.2);
            box-shadow:
                inset 0 2px 4px rgba(0, 0, 0, 0.4),
                inset 0 0 2px rgba(0, 0, 0, 0.2);
            /* Slight downward shift to simulate physical press */
            transform: translateY(1px);
        }

        /* Specific press effect for red keys */
        .btn-red:active {
            background: rgba(80, 0, 0, 0.25);
        }

        /* Specific press effect for white keys */
        .btn-white:active {
            background: rgba(0, 0, 0, 0.15);
            box-shadow:
                inset 0 2px 3px rgba(0, 0, 0, 0.3),
                inset 0 0 1px rgba(0, 0, 0, 0.15);
        }

        /* Visual "flash" feedback on key press */
        .btn.pressed {
            background: rgba(0, 0, 0, 0.35);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.4);
            transition: none;
        }

        /* ══════════════════════════════════════════════════════════
           LOGIN OVERLAY — Centered on the machine
           ══════════════════════════════════════════════════════════ */
        #login-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 4px;
        }

        #login-overlay p {
            color: #eee;
            margin-bottom: 20px;
            font-size: 0.9em;
            text-align: center;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .g_id_signin { display: inline-block; }

        /* User info — small bar at top of machine */
        #user-bar {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.55);
            color: #eee;
            font-size: 0.6em;
            text-align: center;
            padding: 3px 8px;
            z-index: 15;
            border-radius: 4px 4px 0 0;
        }

        /* Hide calculator elements until login */
        .calc-hidden { display: none; }
        /* Buttons are invisible overlays but must remain in layout */
        .btn-hidden { visibility: hidden; }

        /* ══════════════════════════════════════════════════════════
           RESPONSIVE
           ══════════════════════════════════════════════════════════ */
        @media (max-width: 500px) {
            body { padding: 10px; }
            .receipt { font-size: 0.6em; max-height: 160px; }
            .receipt-container { top: 12%; }
        }
    </style>
</head>

<body>
    <div class="machine-wrapper">

        <!-- The real photograph — the only visual base -->
        <img src="olivetti-front.jpg" alt="Olivetti Multisumma 20" class="machine-photo">


        <!-- ════ DIGIT COUNTER — marker in the display window ════ -->
        <div class="digit-counter">
            <div class="marker" id="digit-marker"></div>
        </div>

        <!-- ════ RECEIPT COVER — hides text behind plastic ════ -->
        <div class="receipt-cover" id="receipt-cover"></div>

        <!-- ════ PAPER RECEIPT — comes out of the printer ════ -->
        <div class="receipt-container">
            <div class="receipt" id="receipt"></div>
        </div>


        <!-- ════════════════════════════════════════════════════════
             BUTTON OVERLAYS
             Each button is positioned over the corresponding key
             in the photograph using percentage-based coordinates.

             Positions were mapped from olivetti-front.jpg:
             - Image shows the machine from a slightly elevated angle
             - The keypad panel occupies the lower ~45% of the image
             - Keys are mapped relative to total image dimensions
             ════════════════════════════════════════════════════════ -->

        <!-- ── Number keys (white) ── -->
        <!-- Row: 7 8 9 -->
        <button class="btn btn-white" onclick="pressDigit('7')"
            style="left:38%; top:57%; width:6.5%; height:4%;" title="7"></button>
        <button class="btn btn-white" onclick="pressDigit('8')"
            style="left:45%; top:57%; width:6.5%; height:4%;" title="8"></button>
        <button class="btn btn-white" onclick="pressDigit('9')"
            style="left:52%; top:57%; width:6.5%; height:4%;" title="9"></button>

        <!-- Row: 4 5 6 -->
        <button class="btn btn-white" onclick="pressDigit('4')"
            style="left:38%; top:62.5%; width:6.5%; height:4%;" title="4"></button>
        <button class="btn btn-white" onclick="pressDigit('5')"
            style="left:45%; top:62.5%; width:6.5%; height:4%;" title="5"></button>
        <button class="btn btn-white" onclick="pressDigit('6')"
            style="left:52%; top:62.5%; width:6.5%; height:4%;" title="6"></button>

        <!-- Row: 1 2 3 -->
        <button class="btn btn-white" onclick="pressDigit('1')"
            style="left:38%; top:68%; width:6.5%; height:4%;" title="1"></button>
        <button class="btn btn-white" onclick="pressDigit('2')"
            style="left:45%; top:68%; width:6.5%; height:4%;" title="2"></button>
        <button class="btn btn-white" onclick="pressDigit('3')"
            style="left:52%; top:68%; width:6.5%; height:4%;" title="3"></button>

        <!-- Row: 0, 00, 000 -->
        <button class="btn btn-white" onclick="pressDigit('0')"
            style="left:38%; top:73%; width:6.5%; height:4%;" title="0"></button>
        <button class="btn" onclick="pressDigit('00')"
            style="left:45%; top:73%; width:6.5%; height:4%;" title="00"></button>
        <button class="btn" onclick="pressDigit('000')"
            style="left:52%; top:73%; width:6.5%; height:4%;" title="000"></button>

        <!-- ── Right side: − (red, tall) ── -->
        <button class="btn btn-red" onclick="pressOp('subtract')"
            style="left:63%; top:56.5%; width:10%; height:10%;" title="subtract"></button>

        <!-- ── Right side: + (black, tall) ── -->
        <button class="btn" onclick="pressOp('add')"
            style="left:63%; top:67.5%; width:10%; height:10%;" title="add"></button>

        <!-- ── Far right: ◇ (subtotal) ── -->
        <button class="btn" onclick="pressSubtotal()"
            style="left:74%; top:62%; width:6.5%; height:4.5%;" title="subtotal"></button>

        <!-- ── Far right: * (total) ── -->
        <button class="btn" onclick="pressTotal()"
            style="left:74%; top:73%; width:6.5%; height:4.5%;" title="total"></button>

        <!-- ── Left side: = (red pill button) ── -->
        <button class="btn btn-red" onclick="pressEquals()"
            style="left:12%; top:66%; width:10%; height:5.5%; border-radius:50%;" title="equals"></button>

        <!-- ── Left side: × (multiply) ── -->
        <button class="btn" onclick="pressOp('multiply')"
            style="left:10%; top:72%; width:8%; height:4.5%;" title="multiply"></button>

        <!-- ── Left side: C (clear) ── -->
        <button class="btn" onclick="pressClear()"
            style="left:19%; top:72%; width:8%; height:4.5%;" title="clear"></button>

        <!-- ── Left side: ÷ (divide) — mapped to toggle area ── -->
        <button class="btn" onclick="pressOp('divide')"
            style="left:16%; top:59.5%; width:7%; height:5%;" title="divide"></button>

    </div>

    <script>
        /* ══════════════════════════════════════════════════════════
           SOUND ENGINE — Web Audio API
           Mechanical sounds of the Olivetti Multisumma 20
           ══════════════════════════════════════════════════════════ */
        var ac = null;

        function getAC() {
            if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
            return ac;
        }

        /** Generate a noise buffer. */
        function mkNoise(dur, amp) {
            var c = getAC(), n = c.sampleRate * dur;
            var b = c.createBuffer(1, n, c.sampleRate);
            var d = b.getChannelData(0);
            for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * amp;
            return b;
        }

        /** Mechanical key click — sharp snap + body thud. */
        function sndClick() {
            var c = getAC(), t = c.currentTime;
            // Snap
            var s = c.createBufferSource(); s.buffer = mkNoise(0.03, 0.4);
            var f = c.createBiquadFilter(); f.type = "bandpass"; f.frequency.value = 2800; f.Q.value = 2;
            var g = c.createGain(); g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
            s.connect(f); f.connect(g); g.connect(c.destination); s.start(t); s.stop(t + 0.035);
            // Thud
            var o = c.createOscillator(); o.type = "sine"; o.frequency.value = 140;
            var g2 = c.createGain(); g2.gain.setValueAtTime(0.07, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
            o.connect(g2); g2.connect(c.destination); o.start(t); o.stop(t + 0.06);
        }

        /** Print sound — motor whir + hammer strike + paper ratchet. */
        function sndPrint() {
            var c = getAC(), t = c.currentTime;
            // Motor
            var mo = c.createOscillator(); mo.type = "sawtooth";
            mo.frequency.setValueAtTime(70, t); mo.frequency.linearRampToValueAtTime(120, t + 0.06);
            mo.frequency.linearRampToValueAtTime(45, t + 0.22);
            var mf = c.createBiquadFilter(); mf.type = "lowpass"; mf.frequency.value = 350;
            var mg = c.createGain(); mg.gain.setValueAtTime(0.06, t);
            mg.gain.linearRampToValueAtTime(0.11, t + 0.04);
            mg.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
            mo.connect(mf); mf.connect(mg); mg.connect(c.destination); mo.start(t); mo.stop(t + 0.25);
            // Hammer
            var hs = c.createBufferSource(); hs.buffer = mkNoise(0.018, 0.5);
            var hf = c.createBiquadFilter(); hf.type = "highpass"; hf.frequency.value = 1800;
            var hg = c.createGain(); hg.gain.setValueAtTime(0.35, t + 0.04);
            hg.gain.exponentialRampToValueAtTime(0.001, t + 0.075);
            hs.connect(hf); hf.connect(hg); hg.connect(c.destination); hs.start(t + 0.04); hs.stop(t + 0.08);
            // Ratchet clicks
            for (var r = 0; r < 4; r++) { (function(r) {
                var rt = t + 0.11 + r * 0.022;
                var rs = c.createBufferSource(); rs.buffer = mkNoise(0.005, 0.18);
                var rg = c.createGain(); rg.gain.setValueAtTime(0.16, rt);
                rg.gain.exponentialRampToValueAtTime(0.001, rt + 0.008);
                rs.connect(rg); rg.connect(c.destination); rs.start(rt); rs.stop(rt + 0.01);
            })(r); }
        }

        /** Bell ding — on total. */
        function sndBell() {
            var c = getAC(), t = c.currentTime;
            var o1 = c.createOscillator(); o1.type = "sine"; o1.frequency.value = 2400;
            var g1 = c.createGain(); g1.gain.setValueAtTime(0.2, t);
            g1.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
            o1.connect(g1); g1.connect(c.destination); o1.start(t); o1.stop(t + 0.6);
            var o2 = c.createOscillator(); o2.type = "sine"; o2.frequency.value = 3500;
            var g2 = c.createGain(); g2.gain.setValueAtTime(0.07, t);
            g2.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
            o2.connect(g2); g2.connect(c.destination); o2.start(t); o2.stop(t + 0.4);
        }

        /** Carriage return — slide + thud. Used on clear. */
        function sndCarriage() {
            var c = getAC(), t = c.currentTime;
            var o = c.createOscillator(); o.type = "sawtooth";
            o.frequency.setValueAtTime(170, t); o.frequency.exponentialRampToValueAtTime(35, t + 0.25);
            var f = c.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = 400;
            var g = c.createGain(); g.gain.setValueAtTime(0.09, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
            o.connect(f); f.connect(g); g.connect(c.destination); o.start(t); o.stop(t + 0.26);
            var es = c.createBufferSource(); es.buffer = mkNoise(0.012, 0.35);
            var eg = c.createGain(); eg.gain.setValueAtTime(0.22, t + 0.22);
            eg.gain.exponentialRampToValueAtTime(0.001, t + 0.26);
            es.connect(eg); eg.connect(c.destination); es.start(t + 0.22); es.stop(t + 0.27);
        }

        /* ══════════════════════════════════════════════════════════
           VISUAL KEY PRESS FEEDBACK
           Brief flash effect on the button overlay
           ══════════════════════════════════════════════════════════ */
        function flashBtn(btn) {
            if (!btn || !btn.classList) return;
            btn.classList.add("pressed");
            setTimeout(function() { btn.classList.remove("pressed"); }, 80);
        }

        function flashByTitle(title) {
            var btn = document.querySelector('.btn[title="' + title + '"]');
            flashBtn(btn);
        }

        /* ══════════════════════════════════════════════════════════
           DIGIT COUNTER
           ══════════════════════════════════════════════════════════ */
        var digitCount = 0;
        var DIGIT_STEP = 8; // % shift per digit

        function updateDigitMarker() {
            var marker = document.getElementById("digit-marker");
            var leftPct;
            if (digitCount === 0) {
                leftPct = 8;
            } else {
                leftPct = 8 + (10 - digitCount) * DIGIT_STEP;
            }
            marker.style.left = leftPct + "%";
            updateMarkerBg(marker);
        }

        /* Photo coordinates (%) where the real marker appears in olivetti-front.jpg — loaded from config */
        var MARKER_PHOTO_X = 22;
        var MARKER_PHOTO_Y = 52.5;

        /** Set the marker background to always show the same cropped area from the photo. */
        function updateMarkerBg(marker) {
            var img = document.querySelector(".machine-photo");
            if (!img) return;
            var wW = img.offsetWidth;
            var wH = img.offsetHeight;
            var srcX = wW * MARKER_PHOTO_X / 100;
            var srcY = wH * MARKER_PHOTO_Y / 100;
            marker.style.setProperty("--machine-w", wW + "px");
            marker.style.setProperty("--machine-h", wH + "px");
            marker.style.setProperty("--marker-bg-x", (-srcX) + "px");
            marker.style.setProperty("--marker-bg-y", (-srcY) + "px");
        }

        function resetDigitMarker() {
            digitCount = 0;
            updateDigitMarker();
        }

        /* ══════════════════════════════════════════════════════════
           STATE
           ══════════════════════════════════════════════════════════ */
        var API_URL = window.location.origin;
        var currentInput = "0";
        var pendingOp = null;
        var pendingValue = null;
        var freshInput = true;


        /* ══════════════════════════════════════════════════════════
           DISPLAY
           ══════════════════════════════════════════════════════════ */
        function updateDisplay(v) {}
        function showError(msg) {}

        /* ══════════════════════════════════════════════════════════
           PAPER RECEIPT
           Simulates the real Olivetti printing behavior:
           - Digits print immediately as typed
           - Operation key finalizes the line with the symbol + rolls
           - Equals prints result + rolls
           ══════════════════════════════════════════════════════════ */
        var sym = { add: "+", subtract: "\u2212", multiply: "\u00d7", divide: "\u00f7" };
        var activeLine = null; // the line currently being typed on

        /** Ensure there is an active line to type digits onto. */
        function ensureLine() {
            if (activeLine) return;
            ensureReceiptSpacer();
            var receipt = document.getElementById("receipt");
            activeLine = document.createElement("div");
            activeLine.className = "r-line";
            activeLine.innerHTML = '<span class="r-val"></span><span class="r-op"></span>';
            receipt.appendChild(activeLine);
        }

        /** Update the digits shown on the active line. */
        function printDigits(text) {
            ensureLine();
            activeLine.querySelector(".r-val").textContent = text;
            scrollToBottom(false);
        }

        /** Animate digits appearing one by one in fixed positions, then call callback. */
        function typeDigits(text, cb) {
            ensureLine();
            var valSpan = activeLine.querySelector(".r-val");
            /* Pre-fill with invisible characters to reserve space */
            valSpan.innerHTML = "";
            var spans = [];
            for (var j = 0; j < text.length; j++) {
                var ch = document.createElement("span");
                ch.textContent = text[j];
                ch.style.visibility = "hidden";
                valSpan.appendChild(ch);
                spans.push(ch);
            }
            scrollToBottom(false);
            var i = spans.length - 1;
            function typeNext() {
                if (i >= 0) {
                    spans[i].style.visibility = "visible";
                    sndClick();
                    i--;
                    setTimeout(typeNext, 30);
                } else {
                    if (cb) cb();
                }
            }
            typeNext();
        }

        /** Finalize the active line with an operation symbol and roll the paper. */
        function finalizeLine(symbol, isTotal) {
            if (!activeLine) return;
            if (symbol) activeLine.querySelector(".r-op").textContent = symbol;
            resetDigitMarker();
            if (isTotal) activeLine.classList.add("r-total");
            // Create the next blank line now, so the roll includes it
            activeLine = null;
            ensureLine();
            rollPaper();
        }


        /** Add a spacer to push first line to bottom of visible area. */
        var spacerAdded = false;
        function ensureReceiptSpacer() {
            if (spacerAdded) return;
            var container = document.querySelector(".receipt-container");
            var receipt = document.getElementById("receipt");
            if (container.clientHeight > 0) {
                var spacer = document.createElement("div");
                spacer.style.height = container.clientHeight + "px";
                receipt.insertBefore(spacer, receipt.firstChild);
                spacerAdded = true;
            }
        }

        /** Scroll the receipt container to show the bottom content. */
        function scrollToBottom(animate) {
            var container = document.querySelector(".receipt-container");
            var target = container.scrollHeight - container.clientHeight;
            if (target < 0) target = 0;
            if (!animate) {
                container.scrollTop = target;
                applyRollerEffect();
                return;
            }
            var start = container.scrollTop;
            var diff = target - start;
            if (diff <= 0) { applyRollerEffect(); return; }
            var startTime = null;
            function frame(time) {
                if (!startTime) startTime = time;
                var progress = Math.min((time - startTime) / 300, 1);
                var eased = 1 - Math.pow(1 - progress, 3);
                container.scrollTop = start + diff * eased;
                applyRollerEffect();
                if (progress < 1) requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }

        /** Apply roller curve effect — lines near the top compress and fade. */
        function applyRollerEffect() {
            var container = document.querySelector(".receipt-container");
            var lines = document.querySelectorAll("#receipt .r-line");
            var containerRect = container.getBoundingClientRect();
            var rollerPct = parseFloat(container.dataset.rollerZone || 35);
            var rollerY = containerRect.height * rollerPct / 100;
            /* Clip line is the average of clipTopLeft and clipTopRight */
            var cp = getComputedStyle(container).clipPath;
            var clipTop = 0;
            if (cp && cp.indexOf("polygon") !== -1) {
                var nums = cp.match(/[\d.]+%/g);
                if (nums && nums.length >= 4) {
                    clipTop = (parseFloat(nums[1]) + parseFloat(nums[3])) / 2;
                }
            }
            var clipY = containerRect.height * clipTop / 100;
            var zoneHeight = rollerY - clipY; // compression happens between clip line and roller line

            lines.forEach(function(line) {
                var lineRect = line.getBoundingClientRect();
                var lineTop = lineRect.top - containerRect.top;

                if (lineTop < rollerY && zoneHeight > 0) {
                    // t=1 at clip line (fully compressed), t=0 at roller line
                    var t = Math.max(0, Math.min(1, (rollerY - lineTop) / zoneHeight));
                    var sy = 1 - t * 0.85;       // compress to 15% height at top
                    var op = 1 - t * 0.9;         // fade to 10% opacity at top
                    line.style.transform = "scaleY(" + sy.toFixed(3) + ")";
                    line.style.transformOrigin = "bottom";
                    line.style.opacity = op.toFixed(3);
                } else {
                    line.style.transform = "";
                    line.style.opacity = "";
                }
            });
        }

        /** Animate the paper rolling upward by one line. */
        function rollPaper() {
            scrollToBottom(true);
        }

        /* ══════════════════════════════════════════════════════════
           KEY HANDLERS
           ══════════════════════════════════════════════════════════ */
        function pressDigit(d, e) {
            sndClick();
            if (e) flashBtn(e.target || e);
            if (freshInput) {
                currentInput = (d === ".") ? "0." : d;
                freshInput = false;
                digitCount = 0;
            } else {
                if (d === "." && currentInput.indexOf(".") !== -1) return;
                var numDigits = currentInput.replace(/\D/g, "").length;
                if (d !== "." && numDigits >= 9) return;
                if (currentInput === "0" && d !== ".") currentInput = d;
                else currentInput += d;
            }
            digitCount++;
            updateDigitMarker();
            updateDisplay(currentInput);
        }

        function pressOp(op, e) {
            sndPrint();
            if (e) flashBtn(e.target || e);
            var v = parseFloat(currentInput);
            if (pendingOp !== null && !freshInput) {
                typeDigits(currentInput, function() {
                    finalizeLine(sym[pendingOp], false);
                    callAPI(pendingOp, pendingValue, v, function(r) {
                        pendingValue = r; pendingOp = op;
                        currentInput = String(r); freshInput = true;
                        updateDisplay(fmt(r));
                    });
                });
            } else {
                typeDigits(currentInput, function() {
                    finalizeLine(sym[op], false);
                    pendingValue = v; pendingOp = op; freshInput = true;
                });
            }
        }

        function pressEquals(e) {
            sndPrint();
            if (e) flashBtn(e.target || e);
            if (!pendingOp) return;
            var v = parseFloat(currentInput);
            typeDigits(currentInput, function() {
                finalizeLine(sym[pendingOp], false);
                callAPI(pendingOp, pendingValue, v, function(r) {
                    typeDigits(fmt(r), function() {
                        finalizeLine("=", true);
        
                        pendingValue = null; pendingOp = null;
                        currentInput = String(r); freshInput = true;
                    });
                });
            });
        }

        function pressSubtotal(e) {
            sndPrint();
            if (e) flashBtn(e.target || e);
            if (!pendingOp) return;
            var v = parseFloat(currentInput);
            typeDigits(currentInput, function() {
                finalizeLine(sym[pendingOp], false);
                callAPI(pendingOp, pendingValue, v, function(r) {
                    typeDigits(fmt(r), function() {
                        finalizeLine("\u25c7", true);
        
                        pendingValue = r; pendingOp = null;
                        currentInput = String(r); freshInput = true;
                    });
                });
            });
        }

        function pressTotal(e) {
            sndPrint();
            if (e) flashBtn(e.target || e);
            if (pendingOp !== null && !freshInput) {
                var v = parseFloat(currentInput);
                typeDigits(currentInput, function() {
                    finalizeLine(sym[pendingOp], false);
                    callAPI(pendingOp, pendingValue, v, function(r) {
                        typeDigits(fmt(r), function() {
                            finalizeLine("*", true);
            
                            pendingValue = null; pendingOp = null;
                            currentInput = String(r); freshInput = true;
                        });
                    });
                });
            } else {
                finalizeLine("*", true);
                freshInput = true;
            }
        }

        function pressClear(e) {
            sndClick(); sndCarriage();
            if (e) flashBtn(e.target || e);
            currentInput = "0"; freshInput = true;
            pendingOp = null; pendingValue = null;
            activeLine = null;
            updateDisplay("0");
        }

        /* ══════════════════════════════════════════════════════════
           API
           ══════════════════════════════════════════════════════════ */
        function callAPI(op, a, b, cb) {
            fetch(API_URL + "/" + op + "/" + a + "/" + b, {
                headers: {}
            })
            .then(function(r) {
                return r.json().then(function(d) {
                    if (!r.ok) { showError(d.detail || "Err"); printReceipt("ERR", "!", false); return; }
                    cb(d.result);
                });
            })
            .catch(function() {
                showError("Err"); printReceipt("ERR", "!", false);
            });
        }

        function fmt(n) {
            if (Number.isInteger(n)) return String(n);
            return parseFloat(n.toFixed(8)).toString();
        }

        /* ══════════════════════════════════════════════════════════
           KEYBOARD SUPPORT
           ══════════════════════════════════════════════════════════ */
        document.addEventListener("keydown", function(e) {
            if (e.repeat) return;
            var handled = true;
            if (e.key >= "0" && e.key <= "9") { flashByTitle(e.key); pressDigit(e.key); }
            else if (e.key === "." || e.key === ",") { pressDigit("."); }
            else if (e.key === "+") { flashByTitle("add"); pressOp("add"); }
            else if (e.key === "-") { flashByTitle("subtract"); pressOp("subtract"); }
            else if (e.key === "*") { flashByTitle("multiply"); pressOp("multiply"); }
            else if (e.key === "/") { flashByTitle("divide"); pressOp("divide"); }
            else if (e.key === "Enter") { flashByTitle("equals"); pressEquals(); }
            else if (e.key === "Escape") { flashByTitle("clear"); pressClear(); }
            else { handled = false; }
            if (handled) e.preventDefault();
        });

        /** Position the cover's background to sample from the photo at its exact location. */
        function updateCoverBg(cv) {
            var img = document.querySelector(".machine-photo");
            if (!img || !cv) return;
            var wW = img.offsetWidth;
            var wH = img.offsetHeight;
            cv.style.setProperty("--machine-w", wW + "px");
            cv.style.setProperty("--machine-h", wH + "px");
            cv.style.setProperty("--cover-bg-x", (-cv.offsetLeft) + "px");
            cv.style.setProperty("--cover-bg-y", (-cv.offsetTop) + "px");
        }

        /* Recalculate on resize */
        window.addEventListener("resize", function() {
            var cv = document.getElementById("receipt-cover");
            if (cv) updateCoverBg(cv);
        });

        /* ══════════════════════════════════════════════════════════
           WIRE UP onclick TO PASS EVENT FOR FLASH EFFECT
           ══════════════════════════════════════════════════════════ */
        document.querySelectorAll(".btn").forEach(function(btn) {
            var origClick = btn.getAttribute("onclick");
            btn.removeAttribute("onclick");
            btn.addEventListener("click", function(e) {
                /* Re-invoke the original handler, passing the event */
                var fn = origClick.replace(")", ",event)").replace("(,", "(");
                try { eval(fn); } catch(ex) { /* fallback */ }
            });
        });

        /* ══════════════════════════════════════════════════════════
           LOAD SAVED BUTTON LAYOUT FROM SERVER
           Reads positions saved via /api/layout
           ══════════════════════════════════════════════════════════ */
        (function() {
            fetch("/api/layout")
                .then(function(r) { return r.json(); })
                .then(function(saved) {
                    if (!saved) return;
                    /* Handle both old (array) and new ({buttons, receipt}) format */
                    var buttons = Array.isArray(saved) ? saved : (saved.buttons || []);
                    var receipt = saved.receipt || null;
                    var counter = saved.counter || null;

                    /* Apply button positions */
                    if (buttons.length) {
                        var btns = document.querySelectorAll(".btn");
                        var byId = {};
                        btns.forEach(function(b) { byId[b.title.toLowerCase()] = b; });
                        buttons.forEach(function(pos) {
                            var b = byId[pos.id.toLowerCase()];
                            if (!b) return;
                            b.style.left   = pos.left + "%";
                            b.style.top    = pos.top + "%";
                            b.style.width  = pos.width + "%";
                            b.style.height = pos.height + "%";
                        });
                    }

                    /* Apply receipt position and clip-path */
                    if (receipt) {
                        var rc = document.querySelector(".receipt-container");
                        if (rc) {
                            rc.style.left   = receipt.left + "%";
                            rc.style.top    = receipt.top + "%";
                            rc.style.width  = receipt.width + "%";
                            rc.style.height = receipt.height + "%";
                            var clipL = receipt.clipTopLeft || 0;
                            var clipR = receipt.clipTopRight || 0;
                            /* Clip-path on container for angled top edge */
                            var cp = "polygon(0% " + clipL + "%, 100% " + clipR + "%, 100% 100%, 0% 100%)";
                            rc.style.clipPath = cp;
                            rc.style.webkitClipPath = cp;
                            rc.dataset.rollerZone = receipt.rollerZone || 35;
                        }
                    }
                    /* Apply receipt cover */
                    var cover = saved.cover || null;
                    if (cover) {
                        var cv = document.getElementById("receipt-cover");
                        if (cv) {
                            cv.style.left   = cover.left + "%";
                            cv.style.top    = cover.top + "%";
                            cv.style.width  = cover.width + "%";
                            cv.style.height = cover.height + "%";
                            updateCoverBg(cv);
                        }
                    }

                    /* Apply digit counter position and marker sample */
                    if (counter) {
                        var dc = document.querySelector(".digit-counter");
                        if (dc) {
                            dc.style.left   = counter.left + "%";
                            dc.style.top    = counter.top + "%";
                            dc.style.width  = counter.width + "%";
                            dc.style.height = counter.height + "%";
                        }
                        if (counter.sampleX !== undefined) MARKER_PHOTO_X = counter.sampleX;
                        if (counter.sampleY !== undefined) MARKER_PHOTO_Y = counter.sampleY;
                        updateDigitMarker();
                    }
                })
                .catch(function() {});
        })();
    </script>
</body>
</html>
